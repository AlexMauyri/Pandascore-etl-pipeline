services:
  clickhouse-test:
    image: clickhouse/clickhouse-server:26.3-alpine
    container_name: clickhouse_test
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-etl}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-etl_user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-test_password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      TZ: UTC
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8124:8123" 
      - "9001:9000"
    networks:
      - test_network
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s


  tests:
    build:
      context: .
      dockerfile: Dockerfile.airflow
      target: test
    container_name: etl_tests
    environment:
      CLICKHOUSE_HOST: clickhouse-test
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-etl_user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-test_password}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-etl}
      PANDASCORE_TOKEN: ${PANDASCORE_TOKEN:-dummy_token_for_tests}
    volumes:
      - ./tests:/opt/airflow/tests
      - ./etl:/opt/airflow/etl
      - ./common:/opt/airflow/common
      - ./configs:/opt/airflow/configs
    depends_on:
      clickhouse-test:
        condition: service_healthy
    networks:
      - test_network

networks:
  test_network:
    name: test_network
    driver: bridge
